service: aws-serverless-lab

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  iam:
    role: arn:aws:iam::416934885765:role/LabRole
  environment:
    USERS_TABLE: ${self:service}-${sls:stage}-users

functions:
  login:
    handler: handler.login
    events:
      - httpApi:
          path: /login
          method: post

  users:
    handler: handler.users
    events:
      - httpApi:
          path: /users
          method: get

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-users
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
